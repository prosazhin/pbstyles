name: Prepare

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.x
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check_versions:
    name: Check versions
    runs-on: ubuntu-latest
    outputs:
      check_version: ${{ steps.check_version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Get package version
        id: package_version
        run: |
          echo "current_version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Check package version
        id: check_version
        run: |
          CURRENT_VERSION="${{ steps.package_version.outputs.current_version }}"

          PREV_VERSION="$(git show HEAD~1:package.json 2>/dev/null | node -p 'const fs=require("fs"); const s=fs.readFileSync(0,"utf8"); JSON.parse(s).version' 2>/dev/null || true)"

          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: ${PREV_VERSION:-<none>}"

          if [ -z "$PREV_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  create_tag:
    name: Create tag
    if: needs.check_versions.outputs.check_version == 'true'
    needs: [check_versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release tag
        run: |
          VERSION="$(node -p 'require("./package.json").version')"
          if [ -z "$VERSION" ]; then
            echo "Version is empty. Stop tagging."
            exit 1
          fi
          echo "TAG_NAME=@prosazhin/pbstyles@v$VERSION" >> $GITHUB_ENV
      - uses: joutvhu/create-tag@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          message: ${{ github.event.head_commit.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
